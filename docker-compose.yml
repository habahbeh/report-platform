version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: report_db
    environment:
      POSTGRES_DB: report_platform
      POSTGRES_USER: report_user
      POSTGRES_PASSWORD: report_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: report_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: report_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://report_user:report_pass@db:5432/report_platform
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
    env_file:
      - .env

  celery:
    build: ./backend
    container_name: report_celery
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://report_user:report_pass@db:5432/report_platform
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env

  frontend:
    build: ./frontend
    container_name: report_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api

volumes:
  postgres_data:
  media_data:
